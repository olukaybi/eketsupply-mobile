# ──────────────────────────────────────────────────────────────────────────────
# Dependabot Auto-Merge
#
# Automatically approves and merges Dependabot PRs that:
#   - Are patch-level updates (semver patch only)
#   - Have all CI status checks passing (TypeScript, Tests, Lint, Build)
#
# Minor and major updates are left for manual review.
#
# Prerequisites:
#   1. Enable "Allow auto-merge" in repo Settings → General → Pull Requests.
#   2. Enable branch protection on `main` requiring all 4 CI status checks.
#   3. The GITHUB_TOKEN has write permissions (granted below via `permissions`).
# ──────────────────────────────────────────────────────────────────────────────

name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge Dependabot patch PRs
    runs-on: ubuntu-latest
    # Only run for PRs opened by Dependabot
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve patch updates
        # Approve only patch-level bumps (e.g. 1.2.3 → 1.2.4)
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch updates
        # Squash-merge once all required CI checks pass
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on minor/major updates (manual review required)
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body \
            "👋 This is a **${{ steps.metadata.outputs.update-type }}** update and requires manual review before merging. Please check the changelog for breaking changes."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
